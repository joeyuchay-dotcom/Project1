<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-border: rgba(255, 255, 255, 0.18);
        --text: #f7fbf8;
        --muted: #b7c9c1;
        --accent: #39d98a;
        --accent-2: #68e1fd;
        --shadow: rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 15% 25%, rgba(57, 217, 138, 0.24), transparent 28%),
          radial-gradient(circle at 85% 20%, rgba(104, 225, 253, 0.18), transparent 30%),
          linear-gradient(135deg, #071113 0%, #102124 46%, #182829 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 780px);
        padding: clamp(2rem, 6vw, 4.5rem);
        position: relative;
        isolation: isolate;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        box-shadow: 0 28px 90px var(--shadow);
        backdrop-filter: blur(22px);
      }

      main::before {
        content: "";
        position: absolute;
        inset: -1px;
        z-index: -1;
        border-radius: inherit;
        background: linear-gradient(120deg, rgba(57, 217, 138, 0.28), rgba(104, 225, 253, 0.18), transparent 65%);
        opacity: 0.8;
        padding: 1px;
      }

      nav {
        display: flex;
        justify-content: center;
        gap: 0.7rem;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }

      nav a {
        color: var(--text);
        text-decoration: none;
        padding: 0.72rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        font-weight: 700;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      nav a:hover,
      nav a.active {
        transform: translateY(-2px);
        border-color: rgba(104, 225, 253, 0.72);
        background: rgba(104, 225, 253, 0.12);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        margin-bottom: 1.4rem;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .badge::before {
        content: "";
        width: 0.65rem;
        height: 0.65rem;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 22px var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 7rem);
        line-height: 0.92;
        font-weight: 900;
        letter-spacing: 0;
      }

      h1 span {
        display: block;
        color: transparent;
        background: linear-gradient(90deg, var(--accent), var(--accent-2), #ffffff);
        background-clip: text;
        -webkit-background-clip: text;
      }

      p {
        max-width: 44rem;
        margin: 1.6rem auto 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        line-height: 1.7;
      }

      .sparkline {
        width: min(100%, 420px);
        height: 5px;
        margin: 2.25rem auto 0;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
        filter: drop-shadow(0 0 16px rgba(104, 225, 253, 0.5));
      }

      .contact-list {
        display: grid;
        gap: 0.8rem;
        max-width: 32rem;
        margin: 2rem auto 0;
        padding: 0;
        list-style: none;
      }

      .contact-list a {
        display: block;
        color: var(--text);
        text-decoration: none;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.055);
      }

      @media (max-width: 520px) {
        main {
          padding: 2rem 1.35rem;
        }

        nav a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a class="active" href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="badge">About this page</div>
      <h1>Made <span>With Style</span></h1>
      <p>This little site started as Hello World and grew into a tiny three-page experience with a smooth glass look, bright highlights, and simple navigation.</p>
      <div class="sparkline" aria-hidden="true"></div>
    </main>
  </body>
</html>
